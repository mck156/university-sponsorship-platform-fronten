<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>高校赞助对接平台</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f7fb; margin: 0; }
    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      background: #1f3a8a; color: #fff; padding: 12px 20px;
    }
    .topbar-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .user-summary { background: rgba(255,255,255,.12); border-radius: 8px; padding: 4px 10px; }
    .role-switch { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; }
    .role-switch span { opacity: .9; }
    .role-switch select { width: auto; min-width: 120px; }
    .container { max-width: 1120px; margin: 24px auto; padding: 0 16px; }
    .app-shell { display: grid; grid-template-columns: 220px 1fr; gap: 16px; align-items: start; }
    .side-nav { position: sticky; top: 16px; }
    #pageMenu { display: grid; gap: 8px; }
    .menu-item { width: 100%; text-align: left; }
    .menu-item.active { background: #1d4ed8; }
    .card {
      background: #fff; border-radius: 10px; padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
    }
    h2,h3 { margin-top: 0; }
    label { display:block; margin: 12px 0 6px; }
    input, select, textarea { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #cfd4dc; border-radius: 6px; }
    textarea { min-height: 90px; resize: vertical; }
    .row { display: flex; gap: 8px; margin-top: 12px; }
    button {
      border: 0; border-radius: 6px; padding: 10px 12px; cursor: pointer;
      background: #2563eb; color: white;
    }
    button.secondary { background: #4b5563; }
    button.warning { background: #d97706; }
    button.danger-btn { background: #dc2626; }
    button.link-btn { background: transparent; color: #2563eb; padding: 0; }
    .row button { flex: 1; }
    .error { color: #dc2626; margin-top: 10px; min-height: 20px; }
    .success { color: #16a34a; margin-top: 10px; min-height: 20px; }
    .hidden { display: none !important; }
    .panel {
      position: fixed; inset: 0; background: rgba(0,0,0,.35);
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
    }
    .panel .card { width: 460px; max-width: calc(100vw - 24px); }

    .dashboard-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }
    .stat-item {
      background: #eef2ff;
      border-radius: 8px;
      padding: 10px;
    }
    .stat-item strong { display: block; font-size: 22px; margin-top: 4px; }

    .project-layout {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 16px;
      align-items: start;
    }
    .project-list {
      display: grid;
      gap: 10px;
    }
    .project-card {
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
    }
    .project-card.active { border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37,99,235,.15); }
    .project-head { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .project-actions { display: flex; gap: 6px; margin-top: 10px; }
    .project-actions button { padding: 6px 8px; font-size: 12px; }

    .tag {
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: bold;
      border: 1px solid transparent;
    }
    .tag-applying { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
    .tag-signed { background: #ecfdf5; color: #047857; border-color: #6ee7b7; }
    .tag-executing { background: #fff7ed; color: #c2410c; border-color: #fdba74; }
    .tag-completed { background: #f5f3ff; color: #6d28d9; border-color: #c4b5fd; }
    .tag-offline { background: #f3f4f6; color: #374151; border-color: #d1d5db; }

    .applications { padding-left: 18px; margin: 8px 0 0; }

    .filters {
      display: grid;
      grid-template-columns: repeat(3, minmax(120px, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }
    .browse-detail, .contract-preview {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 10px;
      margin-top: 10px;
    }
    .application-item {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 10px;
    }
    .muted { color: #6b7280; font-size: 13px; }

    .message-layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 12px;
    }
    .message-types { display: grid; gap: 8px; }
    .message-type-btn {
      display: flex; justify-content: space-between; align-items: center;
      background: #eef2ff; color: #1e3a8a;
    }
    .message-type-btn.active { background: #1d4ed8; color: #fff; }
    .unread-badge {
      min-width: 18px; height: 18px; border-radius: 999px;
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0 6px; font-size: 12px; background: #dc2626; color: #fff;
    }
    .unread-badge.is-zero { visibility: hidden; }
    .message-main { display: grid; gap: 10px; }
    .message-head { display: flex; justify-content: flex-end; }
    .message-list { display: grid; gap: 8px; }
    .message-item { border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; cursor: pointer; }
    .message-item.unread { border-left: 4px solid #2563eb; background: #eff6ff; }
    .message-item.active { box-shadow: 0 0 0 2px rgba(37,99,235,.15); }
    .message-detail { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; min-height: 130px; }

    .toast-wrap {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 30;
      display: grid;
      gap: 8px;
    }
    .toast {
      min-width: 220px;
      background: #111827;
      color: #fff;
      border-radius: 8px;
      padding: 10px 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,.25);
      opacity: .95;
    }
    .toast.error { background: #b91c1c; }

    @media (max-width: 860px) {
      .app-shell { grid-template-columns: 1fr; }
      .project-layout { grid-template-columns: 1fr; }
      .filters { grid-template-columns: 1fr; }
      .message-layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <strong>高校赞助对接平台</strong>
    <div class="topbar-right">
      <span id="userSummary" class="user-summary">未登录</span>
      <label class="role-switch" for="roleSelect"><span>角色</span>
        <select id="roleSelect">
          <option value="student">学生</option>
          <option value="club">社团</option>
          <option value="sponsor">赞助商</option>
          <option value="admin">管理员</option>
        </select>
      </label>
      <button id="logoutBtn" class="secondary hidden">退出登录</button>
    </div>
  </header>

  <main id="authView" class="container" style="max-width:420px;">
    <div class="card">
      <h2>登录</h2>
      <label for="loginAccount">邮箱 / 手机号</label>
      <input id="loginAccount" placeholder="请输入邮箱或手机号" />

      <label for="loginPassword">密码</label>
      <input id="loginPassword" type="password" placeholder="请输入密码" />

      <div class="row">
        <button id="passwordLogin">密码登录</button>
      </div>

      <hr />

      <label for="smsCode">验证码</label>
      <input id="smsCode" placeholder="请输入验证码" />
      <div class="row">
        <button id="sendCode" class="secondary">发送验证码</button>
        <button id="codeLogin">验证码登录</button>
      </div>

      <div class="row">
        <button id="thirdPartyLogin" class="secondary">第三方登录</button>
      </div>

      <div class="row" style="justify-content: space-between;">
        <button id="openRegister" class="link-btn" type="button">注册</button>
        <button id="openForgot" class="link-btn" type="button">忘记密码</button>
      </div>

      <div id="loginError" class="error"></div>
      <div id="loginMessage" class="success"></div>
    </div>
  </main>

  <main id="appView" class="container hidden app-shell">
    <aside class="card side-nav">
      <h3>功能导航</h3>
      <nav id="pageMenu"></nav>
    </aside>
    <section id="pageContainer">
    <div class="card" id="tpl-dashboard">
      <h2>主界面</h2>
      <p>你已登录成功，欢迎使用系统。当前角色：<strong id="currentRole">-</strong></p>
      <div id="dashboardStats" class="dashboard-stats"></div>
    </div>

    <div class="card" id="tpl-project-manage" style="margin-top:16px;">
      <div class="project-head">
        <h3>项目管理</h3>
        <button id="openCreateProject" data-roles="club,admin">创建项目</button>
      </div>
      <div class="project-layout">
        <div id="projectList" class="project-list"></div>
        <div>
          <h3>项目详情</h3>
          <div id="projectDetail">请选择一个项目查看详情。</div>
        </div>
      </div>
    </div>

    <div class="card" id="tpl-project-browse" style="margin-top:16px;">
      <h3>项目浏览（赞助商）</h3>
      <div class="filters">
        <input id="browseSearch" placeholder="搜索项目关键字" />
        <select id="browseCategory">
          <option value="all">全部分类</option>
          <option value="文体活动">文体活动</option>
          <option value="创新创业">创新创业</option>
          <option value="公益实践">公益实践</option>
        </select>
        <select id="browseBudget">
          <option value="all">全部预算</option>
          <option value="low">5万以下</option>
          <option value="mid">5万-8万</option>
          <option value="high">8万以上</option>
        </select>
      </div>
      <div id="browseProjectList" class="project-list"></div>
      <div id="browseDetail" class="browse-detail">
        <p data-role-block="sponsor"><strong>赞助商推荐：</strong>优先关注“创新创业大赛”。</p>
        <p data-role-block="student"><strong>学生提示：</strong>可参与项目志愿与执行岗位。</p>
        <p data-role-block="admin"><strong>管理提示：</strong>请关注预算异常项目。</p>
        点击“查看详情”后可填写赞助申请。
      </div>
    </div>


    <div class="card" id="tpl-message-center" style="margin-top:16px;">
      <h3>消息中心</h3>
      <div class="message-layout">
        <aside class="message-types" id="messageTypes"></aside>
        <div class="message-main">
          <div class="message-head">
            <button id="markAllRead" class="secondary">全部标为已读</button>
          </div>
          <div id="messageList" class="message-list"></div>
          <div id="messageDetail" class="message-detail muted">请选择消息查看详情。</div>
        </div>
      </div>
    </div>

    <div class="card" id="tpl-apply-manage" style="margin-top:16px;">
      <h3>申请管理与合同</h3>
      <div id="applicationList"></div>
      <div class="contract-preview">
        <h4>合同预览</h4>
        <div id="contractPreview" class="muted">请选择申请后预览合同条款。</div>
        <div class="row">
          <button id="downloadContract">下载合同</button>
        </div>
      </div>
    </div>
    </section>
  </main>

  <section id="registerPanel" class="panel hidden">
    <div class="card">
      <h2>注册</h2>
      <label for="regAccount">账号（邮箱/手机号）</label>
      <input id="regAccount" placeholder="请输入账号" />
      <label for="regPassword">密码</label>
      <input id="regPassword" type="password" placeholder="请输入密码" />
      <label for="regConfirm">确认密码</label>
      <input id="regConfirm" type="password" placeholder="请再次输入密码" />
      <div id="registerError" class="error"></div>
      <div class="row">
        <button id="registerSubmit">提交注册</button>
        <button id="registerCancel" class="secondary">取消</button>
      </div>
    </div>
  </section>

  <section id="forgotPanel" class="panel hidden">
    <div class="card">
      <h2>忘记密码</h2>
      <label for="forgotAccount">账号（邮箱/手机号）</label>
      <input id="forgotAccount" placeholder="请输入账号" />
      <label for="forgotCode">验证码</label>
      <input id="forgotCode" placeholder="请输入验证码" />
      <label for="forgotNewPassword">新密码</label>
      <input id="forgotNewPassword" type="password" placeholder="请输入新密码" />
      <div id="forgotError" class="error"></div>
      <div class="row">
        <button id="forgotSubmit">重置密码</button>
        <button id="forgotCancel" class="secondary">取消</button>
      </div>
    </div>
  </section>

  <section id="projectPanel" class="panel hidden">
    <div class="card">
      <h2 id="projectPanelTitle">创建项目</h2>
      <label for="projectName">项目名称</label>
      <input id="projectName" placeholder="请输入项目名称" />
      <label for="projectSponsor">赞助商</label>
      <input id="projectSponsor" placeholder="请输入赞助商名称" />
      <label for="projectCategory">项目分类</label>
      <select id="projectCategory">
        <option value="文体活动">文体活动</option>
        <option value="创新创业">创新创业</option>
        <option value="公益实践">公益实践</option>
      </select>
      <label for="projectBudget">预算（元）</label>
      <input id="projectBudget" type="number" min="0" placeholder="请输入预算" />
      <label for="projectStatus">项目状态</label>
      <select id="projectStatus"></select>
      <label for="projectDescription">项目描述</label>
      <textarea id="projectDescription" placeholder="请输入项目描述"></textarea>
      <div id="projectFormError" class="error"></div>
      <div class="row">
        <button id="projectSubmit">保存</button>
        <button id="projectCancel" class="secondary">取消</button>
      </div>
    </div>
  </section>

  <div id="toastWrap" class="toast-wrap"></div>

      messageList: document.getElementById('messageList'),
      messageDetail: document.getElementById('messageDetail'),
      markAllRead: document.getElementById('markAllRead'),
      dashboardStats: document.getElementById('dashboardStats'),
      projectList: document.getElementById('projectList'),
      projectDetail: document.getElementById('projectDetail'),
      browseSearch: document.getElementById('browseSearch'),
      browseCategory: document.getElementById('browseCategory'),
      browseBudget: document.getElementById('browseBudget'),
      browseProjectList: document.getElementById('browseProjectList'),
      browseDetail: document.getElementById('browseDetail'),
      applicationList: document.getElementById('applicationList'),
      contractPreview: document.getElementById('contractPreview'),
      downloadContract: document.getElementById('downloadContract'),
      projectPanel: document.getElementById('projectPanel'),
      projectPanelTitle: document.getElementById('projectPanelTitle'),
      projectName: document.getElementById('projectName'),
      projectSponsor: document.getElementById('projectSponsor'),
      projectBudget: document.getElementById('projectBudget'),
      projectCategory: document.getElementById('projectCategory'),
      projectStatus: document.getElementById('projectStatus'),
      projectDescription: document.getElementById('projectDescription'),
      projectFormError: document.getElementById('projectFormError'),
      projectSubmit: document.getElementById('projectSubmit'),
      projectCancel: document.getElementById('projectCancel'),
      openCreateProject: document.getElementById('openCreateProject'),
      toastWrap: document.getElementById('toastWrap')
    };

    const accountRegex = /^(1\d{10}|[^\s@]+@[^\s@]+\.[^\s@]+)$/;
    let currentPageKey = null;

    function showError(message) {
      el.loginError.textContent = message;
      el.loginMessage.textContent = '';
      showToast(message, 'error');
    }

    function showMessage(message) {
      el.loginMessage.textContent = message;
      el.loginError.textContent = '';
      showToast(message);
    }

    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast ${type === 'error' ? 'error' : ''}`.trim();
      toast.textContent = message;
      el.toastWrap.appendChild(toast);
      setTimeout(() => toast.remove(), 2200);
    }

    function populateProjectStatusOptions() {
      el.projectStatus.innerHTML = Object.entries(PROJECT_STATUS)
        .filter(([key]) => key !== 'offline')
        .map(([key, value]) => `<option value="${key}">${value.label}</option>`)
        .join('');
    }

    function getStatusTag(status) {
      const cfg = PROJECT_STATUS[status] || PROJECT_STATUS.applying;
      return `<span class="tag ${cfg.className}">${cfg.label}</span>`;
    }


    function getAllowedPages(role) {
      return pages.filter((page) => page.roles.includes(role));
    }

    function syncRoleTexts(role) {
      const cfg = roleConfig[role] || roleConfig.student;
      el.currentRole.textContent = cfg.label;
      el.roleSelect.value = role in roleConfig ? role : 'student';
    }


    function getUserSummaryText(user, role) {
      if (!user) {
        return '未登录';
      }
      const roleLabel = roleConfig[role]?.label || roleConfig.student.label;
      const name = (user.username || user.account || '用户').trim();
      if (name === roleLabel) {
        return `用户：${name}`;
      }
      return `用户：${name}（${roleLabel}）`;
    }

    function buildRoleMenu(role) {
      const allowedPages = getAllowedPages(role);
      el.pageMenu.innerHTML = allowedPages.map((page) => `<button class="menu-item ${page.key === currentPageKey ? 'active' : ''}" data-page="${page.key}">${page.name}</button>`).join('');
    }

    function ensurePagePermission(role) {
      const allowedPages = getAllowedPages(role);
      if (!allowedPages.length) {
        currentPageKey = null;
        return;
      }
      const hasCurrent = allowedPages.some((page) => page.key === currentPageKey);
      if (!hasCurrent) {
        const fallback = roleConfig[role]?.defaultPage;
        currentPageKey = allowedPages.some((page) => page.key === fallback) ? fallback : allowedPages[0].key;
      }
    }

    function applyRoleActionVisibility(container, role) {
      container.querySelectorAll('[data-roles]').forEach((node) => {
        const allowedRoles = node.dataset.roles.split(',').map((v) => v.trim());
        node.classList.toggle('hidden', !allowedRoles.includes(role));
      });
    }

    function applyRoleContentVisibility(container, role) {
      container.querySelectorAll('[data-role-block]').forEach((node) => {
        node.classList.toggle('hidden', node.dataset.roleBlock !== role);
      });
    }

    function renderCurrentPage() {
      pages.forEach((page) => {
        const section = document.getElementById(page.templateId);
        section.classList.toggle('hidden', page.key !== currentPageKey);
      });
      const current = pages.find((page) => page.key === currentPageKey);
      if (!current) {
        return;
      }
      const activeEl = document.getElementById(current.templateId);
      applyRoleActionVisibility(activeEl, authState.role);
      applyRoleContentVisibility(activeEl, authState.role);
      buildRoleMenu(authState.role);
    }

    function loadMessagesForRole(role) {
      const seed = roleMessageSeed[role] || roleMessageSeed.student;
      messageState.messageStore = seed.map((item, index) => ({ id: index + 1, ...item }));
      messageState.selectedType = 'system';
      messageState.selectedMessageId = null;
      messageState.loadedRole = role;
    }

    function getMessageUnreadCount(type) {
      return messageState.messageStore.filter((item) => item.type === type && !item.read).length;
    }

    function getMessageById(id) {
      return messageState.messageStore.find((item) => item.id === id);
    }

    function renderMessageDetail() {
      const message = getMessageById(messageState.selectedMessageId);
      if (!message) {
        el.messageDetail.textContent = '请选择消息查看详情。';
        el.messageDetail.classList.add('muted');
        return;
      }
      el.messageDetail.classList.remove('muted');
      el.messageDetail.innerHTML = `
        <h4>${message.title}</h4>
        <p class="muted">类型：${messageTypeMap[message.type]} ｜ 时间：${message.time}</p>
        <p>${message.content}</p>
      `;
    }

    function renderMessageCenter() {
      const types = Object.entries(messageTypeMap);
      el.messageTypes.innerHTML = types.map(([key, label]) => {
        const unreadCount = getMessageUnreadCount(key);
        return `
          <button class="message-type-btn ${messageState.selectedType === key ? 'active' : ''}" data-type="${key}">
            <span>${label}</span>
            <span class="unread-badge ${unreadCount === 0 ? 'is-zero' : ''}">${unreadCount}</span>
          </button>
        `;
      }).join('');

      const messageList = messageState.messageStore.filter((item) => item.type === messageState.selectedType);
      if (!messageList.some((item) => item.id === messageState.selectedMessageId)) {
        messageState.selectedMessageId = null;
      }
      el.messageList.innerHTML = messageList.length
        ? messageList.map((item) => `
          <article class="message-item ${item.read ? '' : 'unread'} ${messageState.selectedMessageId === item.id ? 'active' : ''}" data-id="${item.id}">
            <div class="project-head">
              <strong>${item.title}</strong>
              <span class="muted">${item.time}</span>
            </div>
            <div class="muted">${item.content.slice(0, 36)}${item.content.length > 36 ? '...' : ''}</div>
          </article>
        `).join('')
        : '<div class="message-item muted">当前分类暂无消息。</div>';
      renderMessageDetail();
    }

    function setRole(role) {
      const normalized = roleConfig[role] ? role : 'student';
      authState.role = normalized;
      syncRoleTexts(normalized);
      if (authState.currentUser) {
        el.userSummary.textContent = getUserSummaryText(authState.currentUser, normalized);
      }
      if (messageState.loadedRole !== normalized) {
        loadMessagesForRole(normalized);
      }
      ensurePagePermission(normalized);
      renderDashboardStats();
      renderMessageCenter();
      renderProjectManage();
      renderProjectBrowse();
      renderApplicationManage();
      renderCurrentPage();
    }

    function renderDashboardStats() {
      const total = projectState.projectStore.length;
      const statsByStatus = Object.keys(PROJECT_STATUS).reduce((acc, key) => {
        acc[key] = projectState.projectStore.filter((p) => p.status === key).length;
        return acc;
      }, {});
      const allBudget = projectState.projectStore.reduce((sum, item) => sum + Number(item.budget || 0), 0);

      el.dashboardStats.innerHTML = `
        <div class="stat-item"><span>项目总数</span><strong>${total}</strong></div>
        <div class="stat-item"><span>申请中</span><strong>${statsByStatus.applying}</strong></div>
        <div class="stat-item"><span>执行中</span><strong>${statsByStatus.executing}</strong></div>
        <div class="stat-item"><span>已完成</span><strong>${statsByStatus.completed}</strong></div>
        <div class="stat-item"><span>已下架</span><strong>${statsByStatus.offline}</strong></div>
        <div class="stat-item"><span>总预算</span><strong>¥${allBudget.toLocaleString()}</strong></div>
        <div class="stat-item" data-role-block="student"><span>学生专属</span><strong>可申请项目 ${Math.max(total - statsByStatus.offline, 0)}</strong></div>
        <div class="stat-item" data-role-block="sponsor"><span>赞助商推荐</span><strong>匹配项目 ${projectState.projectStore.filter((p) => p.budget >= 50000).length}</strong></div>
        <div class="stat-item" data-role-block="admin"><span>管理员指标</span><strong>待审核申请 ${projectState.applicationStore.filter((a) => a.status === 'applying').length}</strong></div>
        <div class="stat-item" data-role-block="club"><span>社团运营</span><strong>待推进项目 ${projectState.projectStore.filter((p) => p.status === 'applying' || p.status === 'executing').length}</strong></div>
      `;
      applyRoleContentVisibility(el.dashboardStats, authState.role);

    }

    function renderProjectDetail(projectId) {
      const project = projectState.projectStore.find((item) => item.id === projectId);
      if (!project) {
        el.projectDetail.innerHTML = '暂无项目详情。';
        return;
      }
      const applicationsHtml = (project.applications || []).length
        ? `<ul class="applications">${project.applications.map((app) => `<li>${app.sponsorName}｜${app.plan}｜¥${Number(app.amount).toLocaleString()}｜${app.status}</li>`).join('')}</ul>`
        : '<p>暂无赞助商申请。</p>';

      el.projectDetail.innerHTML = `
        <p><strong>${project.name}</strong> ${getStatusTag(project.status)}</p>
        <p>赞助商：${project.sponsor}</p>
        <p>预算：¥${Number(project.budget).toLocaleString()}</p>
        <p>描述：${project.description || '-'}</p>
        <h4>赞助商申请列表</h4>
        ${applicationsHtml}
      `;
    }

    function renderProjectManage() {
      if (!projectState.projectStore.length) {
        el.projectList.innerHTML = '<div class="project-card">暂无项目，点击“创建项目”开始。</div>';
        el.projectDetail.innerHTML = '暂无项目详情。';
        return;
      }

      if (!projectState.projectStore.some((item) => item.id === projectState.selectedProjectId)) {
        projectState.selectedProjectId = projectState.projectStore[0].id;
      }

      el.projectList.innerHTML = projectState.projectStore.map((project) => `
        <article class="project-card ${project.id === projectState.selectedProjectId ? 'active' : ''}" data-id="${project.id}">
          <div class="project-head">
            <strong>${project.name}</strong>
            ${getStatusTag(project.status)}
          </div>
          <div>赞助商：${project.sponsor}</div>
          <div>预算：¥${Number(project.budget).toLocaleString()}</div>
          <div class="project-actions">
            <button data-action="edit" data-id="${project.id}" data-roles="club,admin">编辑</button>
            <button class="warning" data-action="offline" data-id="${project.id}" data-roles="admin">下架</button>
            <button class="danger-btn" data-action="delete" data-id="${project.id}" data-roles="admin">删除</button>
          </div>
        </article>
      `).join('');

      renderProjectDetail(projectState.selectedProjectId);
      applyRoleActionVisibility(document.getElementById('tpl-project-manage'), authState.role || 'student');
    }

    function getFilteredProjects() {
      return projectState.projectStore.filter((project) => {
        const keyword = projectState.browseFilters.keyword.toLowerCase();
        const matchKeyword = !keyword || [project.name, project.description, project.sponsor, project.category]
          .join(' ')
          .toLowerCase()
          .includes(keyword);
        const matchCategory = projectState.browseFilters.category === 'all' || project.category === projectState.browseFilters.category;
        const budget = Number(project.budget || 0);
        const matchBudget = projectState.browseFilters.budget === 'all'
          || (projectState.browseFilters.budget === 'low' && budget < 50000)
          || (projectState.browseFilters.budget === 'mid' && budget >= 50000 && budget <= 80000)
          || (projectState.browseFilters.budget === 'high' && budget > 80000);
        return matchKeyword && matchCategory && matchBudget;
      });
    }

    function renderProjectBrowseDetail(projectId) {
      const project = projectState.projectStore.find((item) => item.id === projectId);
      if (!project) {
        el.browseDetail.innerHTML = '未找到项目详情。';
        return;
      }
      el.browseDetail.innerHTML = `
        <h4>${project.name} ${getStatusTag(project.status)}</h4>
        <p class="muted">分类：${project.category || '-'} ｜预算：¥${Number(project.budget).toLocaleString()}</p>
        <p>${project.description || '-'}</p>
        <label for="applyAmount">赞助金额</label>
        <input id="applyAmount" type="number" min="1" placeholder="请输入赞助金额" />
        <label for="applyRemark">申请备注</label>
        <textarea id="applyRemark" placeholder="可填写补充说明"></textarea>
        <div class="row">
          <button data-action="submit-application" data-id="${project.id}" data-roles="student,sponsor,admin">提交申请</button>
        </div>
      `;
      applyRoleActionVisibility(el.browseDetail, authState.role || 'student');
      applyRoleContentVisibility(el.browseDetail, authState.role || 'student');
    }

    function renderProjectBrowse() {
      const list = getFilteredProjects();
      el.browseProjectList.innerHTML = list.length
        ? list.map((project) => `
          <article class="project-card" data-id="${project.id}">
            <div class="project-head">
              <strong>${project.name}</strong>
              ${getStatusTag(project.status)}
            </div>
            <div class="muted">分类：${project.category || '-'} ｜预算：¥${Number(project.budget).toLocaleString()}</div>
            <div class="project-actions">
              <button data-action="view-detail" data-id="${project.id}">查看详情</button>
            </div>
          </article>
        `).join('')
        : '<div class="project-card">当前筛选条件下无项目。</div>';
      applyRoleActionVisibility(document.getElementById('tpl-project-browse'), authState.role || 'student');
      applyRoleContentVisibility(document.getElementById('tpl-project-browse'), authState.role || 'student');
    }

    function getCurrentTimeText() {
      const now = new Date();
      const p = (v) => String(v).padStart(2, '0');
      return `${now.getFullYear()}-${p(now.getMonth() + 1)}-${p(now.getDate())} ${p(now.getHours())}:${p(now.getMinutes())}`;
    }

    function generateContractText(app) {
      if (!app) {
        return '请选择申请后预览合同条款。';
      }
      return `《高校项目赞助合同（预览）》\n\n甲方：高校赞助平台\n乙方：赞助商（当前登录用户）\n项目名称：${app.projectName}\n赞助金额：¥${Number(app.amount).toLocaleString()}\n当前状态：${PROJECT_STATUS[app.status]?.label || app.status}\n申请时间：${app.time}\n\n条款：\n1. 乙方应按约定支付赞助金额。\n2. 甲方负责项目执行与成果反馈。\n3. 双方确认后合同生效。\n4. 备注：${app.remark || '无'}\n`;
    }

    function renderContractPreview() {
      const app = projectState.applicationStore.find((item) => item.id === projectState.selectedApplicationId);
      el.contractPreview.textContent = generateContractText(app);
    }

    function renderApplicationManage() {
      el.applicationList.innerHTML = projectState.applicationStore.length
        ? projectState.applicationStore.map((app) => {
          const nextStatusFlow = { applying: 'signed', signed: 'executing', executing: 'completed' };
          const nextStatus = nextStatusFlow[app.status];
          const withdrawText = app.status === 'withdrawn' ? '恢复申请' : '撤回申请';
          return `
            <div class="application-item ${projectState.selectedApplicationId === app.id ? 'active' : ''}">
              <div class="project-head">
                <strong>${app.projectName}</strong>
                ${getStatusTag(app.status)}
              </div>
              <div class="muted">金额：¥${Number(app.amount).toLocaleString()} ｜ 时间：${app.time}</div>
              <div>备注：${app.remark || '-'}</div>
              <div class="project-actions">
                <button data-action="select-application" data-id="${app.id}">查看合同</button>
                <button class="secondary" data-action="edit-application" data-id="${app.id}" data-roles="student,sponsor,admin">修改申请</button>
                <button class="warning" data-action="withdraw-application" data-id="${app.id}" data-roles="student,sponsor,admin">${withdrawText}</button>
                ${nextStatus ? `<button data-action="advance-status" data-id="${app.id}" data-roles="admin,club">流转到${PROJECT_STATUS[nextStatus].label}</button>` : ''}
              </div>
            </div>
          `;
        }).join('')
        : '<p class="muted">暂无申请记录。</p>';
      renderContractPreview();
      applyRoleActionVisibility(document.getElementById('tpl-apply-manage'), authState.role || 'student');
    }

    function openProjectPanel(mode, project) {
      el.projectFormError.textContent = '';
      el.projectPanel.classList.remove('hidden');
      if (mode === 'edit' && project) {
        projectState.editingProjectId = project.id;
        el.projectPanelTitle.textContent = '编辑项目';
        el.projectName.value = project.name;
        el.projectSponsor.value = project.sponsor;
        el.projectBudget.value = project.budget;
        el.projectCategory.value = project.category || '文体活动';
        el.projectStatus.value = project.status;
        el.projectDescription.value = project.description || '';
      } else {
        projectState.editingProjectId = null;
        el.projectPanelTitle.textContent = '创建项目';
        el.projectName.value = '';
        el.projectSponsor.value = '';
        el.projectBudget.value = '';
        el.projectCategory.value = '文体活动';
        el.projectStatus.value = 'applying';
        el.projectDescription.value = '';
      }
    }

    function closeProjectPanel() {
      el.projectPanel.classList.add('hidden');
    }

    function saveProject() {
      const name = el.projectName.value.trim();
      const sponsor = el.projectSponsor.value.trim();
      const category = el.projectCategory.value;
      const budget = Number(el.projectBudget.value);
      const status = el.projectStatus.value;
      const description = el.projectDescription.value.trim();

      if (!name || !sponsor || !Number.isFinite(budget) || budget < 0) {
        el.projectFormError.textContent = '请完整填写项目名称、赞助商与有效预算';
        return showToast('项目保存失败：请检查表单内容', 'error');
      }

      if (!PROJECT_STATUS[status]) {
        el.projectFormError.textContent = '项目状态不合法';
        return showToast('项目保存失败：状态不合法', 'error');
      }

      if (projectState.editingProjectId) {
        const idx = projectState.projectStore.findIndex((p) => p.id === projectState.editingProjectId);
        if (idx < 0) {
          return showToast('项目保存失败：未找到要编辑的项目', 'error');
        }
        const old = projectState.projectStore[idx];
        projectState.projectStore[idx] = { ...old, name, sponsor, category, budget, status, description };
        projectState.selectedProjectId = old.id;
        showToast('项目更新成功');
      } else {
        const nextId = projectState.projectStore.length ? Math.max(...projectState.projectStore.map((p) => p.id)) + 1 : 1;
        const created = {
          id: nextId,
          name,
          sponsor,
          category,
          budget,
          status,
          description,
          applications: []
        };
        projectState.projectStore.push(created);
        projectState.selectedProjectId = created.id;
        showToast('项目创建成功');
      }

      closeProjectPanel();
      renderProjectManage();
      renderProjectBrowse();
      renderDashboardStats();
    }

    function handleProjectListClick(event) {
      const button = event.target.closest('button[data-action]');
      if (button) {
        const id = Number(button.dataset.id);
        const project = projectState.projectStore.find((p) => p.id === id);
        if (!project) {
          return showToast('操作失败：项目不存在', 'error');
        }

        if (button.dataset.action === 'edit') {
          return openProjectPanel('edit', project);
        }
        if (button.dataset.action === 'offline') {
          project.status = 'offline';
          projectState.selectedProjectId = id;
          renderProjectManage();
          renderProjectBrowse();
          renderDashboardStats();
          return showToast('项目已下架');
        }
        if (button.dataset.action === 'delete') {
          projectState.projectStore = projectState.projectStore.filter((p) => p.id !== id);
          renderProjectManage();
          renderProjectBrowse();
          renderDashboardStats();
          return showToast('项目删除成功');
        }
      }

      const card = event.target.closest('.project-card[data-id]');
      if (!card) {
        return;
      }
      projectState.selectedProjectId = Number(card.dataset.id);
      renderProjectManage();
    }

    function handleBrowseAndApplicationClick(event) {
      const button = event.target.closest('button[data-action]');
      if (!button) {
        return;
      }
      const id = Number(button.dataset.id);
      if (button.dataset.action === 'view-detail') {
        projectState.browseSelectedProjectId = id;
        return renderProjectBrowseDetail(id);
      }
      if (button.dataset.action === 'submit-application') {
        const amountInput = document.getElementById('applyAmount');
        const remarkInput = document.getElementById('applyRemark');
        const amount = Number(amountInput?.value);
        if (!Number.isFinite(amount) || amount <= 0) {
          return showToast('请输入有效的赞助金额', 'error');
        }
        const project = projectState.projectStore.find((item) => item.id === id);
        if (!project) {
          return showToast('项目不存在', 'error');
        }
        const nextId = projectState.applicationStore.length ? Math.max(...projectState.applicationStore.map((item) => item.id)) + 1 : 1;
        projectState.applicationStore.push({
          id: nextId,
          projectId: id,
          projectName: project.name,
          amount,
          status: 'applying',
          time: getCurrentTimeText(),
          remark: remarkInput?.value.trim() || ''
        });
        projectState.selectedApplicationId = nextId;
        renderApplicationManage();
        showToast('申请提交成功');
        return;
      }

      const app = projectState.applicationStore.find((item) => item.id === id);
      if (!app) {
        return;
      }

      if (button.dataset.action === 'select-application') {
        projectState.selectedApplicationId = id;
        return renderApplicationManage();
      }
      if (button.dataset.action === 'edit-application') {
        const nextAmount = Number(prompt('请输入新的赞助金额', String(app.amount)));
        if (!Number.isFinite(nextAmount) || nextAmount <= 0) {
          return showToast('修改失败：金额无效', 'error');
        }
        const nextRemark = prompt('请输入新的备注', app.remark || '') || '';
        app.amount = nextAmount;
        app.remark = nextRemark.trim();
        app.time = getCurrentTimeText();
        renderApplicationManage();
        return showToast('申请已更新');
      }
      if (button.dataset.action === 'withdraw-application') {
        app.status = app.status === 'withdrawn' ? 'applying' : 'withdrawn';
        renderApplicationManage();
        return showToast(app.status === 'withdrawn' ? '申请已撤回' : '申请已恢复');
      }
      if (button.dataset.action === 'advance-status') {
        const nextStatusFlow = { applying: 'signed', signed: 'executing', executing: 'completed' };
        if (nextStatusFlow[app.status]) {
          app.status = nextStatusFlow[app.status];
          renderApplicationManage();
          showToast(`状态已流转为${PROJECT_STATUS[app.status].label}`);
        }
      }
    }

    function handleMessageTypeClick(event) {
      const btn = event.target.closest('button[data-type]');
      if (!btn) {
        return;
      }
      messageState.selectedType = btn.dataset.type;
      messageState.selectedMessageId = null;
      renderMessageCenter();
    }

    function handleMessageListClick(event) {
      const card = event.target.closest('.message-item[data-id]');
      if (!card) {
        return;
      }
      const id = Number(card.dataset.id);
      const message = getMessageById(id);
      if (!message) {
        return;
      }
      message.read = true;
      messageState.selectedMessageId = id;
      renderMessageCenter();
    }

    function markAllMessageRead() {
      messageState.messageStore.forEach((item) => {
        item.read = true;
      });
      renderMessageCenter();
      showToast('已将全部消息标记为已读');
    }

    function downloadContractFile() {
      const app = projectState.applicationStore.find((item) => item.id === projectState.selectedApplicationId);
      if (!app) {
        return showToast('请先选择申请再下载合同', 'error');
      }
      const contractHtml = `<html><body><pre>${generateContractText(app)}</pre></body></html>`;
      const blob = new Blob([contractHtml], { type: 'text/html;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `${app.projectName}-赞助合同.html`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
      showToast('合同下载已开始');
    }

    function setLoggedIn(userKey, userData) {
      authState.isLoggedIn = true;
      authState.currentUser = { account: userKey, ...userData };
      authState.role = roleConfig[userData.role] ? userData.role : 'student';

      el.userSummary.textContent = getUserSummaryText(authState.currentUser, authState.role);
      el.authView.classList.add('hidden');
      el.appView.classList.remove('hidden');
      el.logoutBtn.classList.remove('hidden');
      showMessage('登录成功');
      setRole(authState.role);
    }

    function clearSession() {
      authState.isLoggedIn = false;
      authState.currentUser = null;
      authState.role = null;

      el.userSummary.textContent = '未登录';
      el.currentRole.textContent = '-';
      el.authView.classList.remove('hidden');
      el.appView.classList.add('hidden');
      el.logoutBtn.classList.add('hidden');
      showMessage('已退出登录');
    }

    function startCountdown() {
      authState.codeCountdown = 60;
      el.sendCode.disabled = true;
      el.sendCode.textContent = `重新发送(${authState.codeCountdown}s)`;

      authState.codeTimer = setInterval(() => {
        authState.codeCountdown -= 1;
        if (authState.codeCountdown <= 0) {
          clearInterval(authState.codeTimer);
          authState.codeTimer = null;
          el.sendCode.disabled = false;
          el.sendCode.textContent = '发送验证码';
          return;
        }
        el.sendCode.textContent = `重新发送(${authState.codeCountdown}s)`;
      }, 1000);
    }

    el.passwordLogin.addEventListener('click', () => {
      const account = el.loginAccount.value.trim();
      const password = el.loginPassword.value;
      if (!accountRegex.test(account)) {
        return showError('请输入正确的邮箱或手机号');
      }
      if (!password) {
        return showError('密码不能为空');
      }

      const user = authState.mockUsers[account];
      if (!user || user.password !== password) {
        return showError('账号或密码错误');
      }

      setLoggedIn(account, user);
    });

    el.sendCode.addEventListener('click', () => {
      const account = el.loginAccount.value.trim();
      if (!accountRegex.test(account)) {
        return showError('请先输入正确的账号再发送验证码');
      }
      authState.currentCode = '123456';
      startCountdown();
      showMessage('验证码已发送（Mock：123456）');
    });

    el.codeLogin.addEventListener('click', () => {
      const account = el.loginAccount.value.trim();
      const code = el.smsCode.value.trim();
      if (!accountRegex.test(account)) {
        return showError('请输入正确的邮箱或手机号');
      }
      const user = authState.mockUsers[account];
      if (!user) {
        return showError('账号不存在，请先注册');
      }
      if (!code) {
        return showError('请输入验证码');
      }
      if (code !== authState.currentCode || code !== '123456') {
        return showError('验证码错误');
      }

      setLoggedIn(account, user);
    });

    el.thirdPartyLogin.addEventListener('click', () => {
      const provider = prompt('请输入第三方登录渠道（wechat/qq/github）', 'wechat');
      if (!provider) {
        return showError('已取消第三方登录');
      }
      const normalized = provider.trim().toLowerCase();
      if (!['wechat', 'qq', 'github'].includes(normalized)) {
        return showError('不支持的第三方渠道');
      }

      const account = `${normalized}_user`;
      const user = {
        username: `${normalized.toUpperCase()}用户`,
        password: '',
        role: 'guest'
      };
      authState.mockUsers[account] = user;
      setLoggedIn(account, user);
    });

    el.openRegister.addEventListener('click', () => {
      el.registerPanel.classList.remove('hidden');
      el.registerError.textContent = '';
    });

    el.registerCancel.addEventListener('click', () => {
      el.registerPanel.classList.add('hidden');
    });

    el.registerSubmit.addEventListener('click', () => {
      const account = el.regAccount.value.trim();
      const password = el.regPassword.value;
      const confirm = el.regConfirm.value;

      if (!accountRegex.test(account)) {
        return (el.registerError.textContent = '账号格式不正确');
      }
      if (!password) {
        return (el.registerError.textContent = '密码不能为空');
      }
      if (password !== confirm) {
        return (el.registerError.textContent = '两次密码输入不一致');
      }
      if (authState.mockUsers[account]) {
        return (el.registerError.textContent = '账号已存在');
      }

      authState.mockUsers[account] = {
        username: account,
        password,
        role: 'student'
      };
      el.registerPanel.classList.add('hidden');
      showMessage('注册成功，请使用新账号登录');
    });

    el.openForgot.addEventListener('click', () => {
      el.forgotPanel.classList.remove('hidden');
      el.forgotError.textContent = '';
      authState.currentCode = '123456';
      showMessage('忘记密码验证码（Mock：123456）');
    });

    el.forgotCancel.addEventListener('click', () => {
      el.forgotPanel.classList.add('hidden');
    });

    el.forgotSubmit.addEventListener('click', () => {
      const account = el.forgotAccount.value.trim();
      const code = el.forgotCode.value.trim();
      const newPassword = el.forgotNewPassword.value;
      const user = authState.mockUsers[account];

      if (!accountRegex.test(account)) {
        return (el.forgotError.textContent = '账号格式不正确');
      }
      if (!user) {
        return (el.forgotError.textContent = '账号不存在');
      }
      if (code !== '123456') {
        return (el.forgotError.textContent = '验证码错误');
      }
      if (!newPassword) {
        return (el.forgotError.textContent = '新密码不能为空');
      }

      authState.mockUsers[account].password = newPassword;
      el.forgotPanel.classList.add('hidden');
      showMessage('密码重置成功，请重新登录');
    });

    el.logoutBtn.addEventListener('click', clearSession);
    el.openCreateProject.addEventListener('click', () => openProjectPanel('create'));
    el.projectCancel.addEventListener('click', closeProjectPanel);
    el.projectSubmit.addEventListener('click', saveProject);
    el.projectList.addEventListener('click', handleProjectListClick);
    el.browseSearch.addEventListener('input', (event) => {
      projectState.browseFilters.keyword = event.target.value.trim();
      renderProjectBrowse();
    });
    el.browseCategory.addEventListener('change', (event) => {
      projectState.browseFilters.category = event.target.value;
      renderProjectBrowse();
    });
    el.browseBudget.addEventListener('change', (event) => {
      projectState.browseFilters.budget = event.target.value;
      renderProjectBrowse();
    });
    el.browseProjectList.addEventListener('click', handleBrowseAndApplicationClick);
    el.browseDetail.addEventListener('click', handleBrowseAndApplicationClick);
    el.applicationList.addEventListener('click', handleBrowseAndApplicationClick);
    el.messageTypes.addEventListener('click', handleMessageTypeClick);
    el.messageList.addEventListener('click', handleMessageListClick);
    el.markAllRead.addEventListener('click', markAllMessageRead);
    el.downloadContract.addEventListener('click', downloadContractFile);
    el.pageMenu.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-page]');
      if (!button) {
        return;
      }
      currentPageKey = button.dataset.page;
      renderCurrentPage();
    });
    el.roleSelect.addEventListener('change', (event) => {
      if (!authState.isLoggedIn) {
        return showToast('请先登录后再切换角色', 'error');
      }
      setRole(event.target.value);
    });

    populateProjectStatusOptions();
  </script>
</body>
</html>
